<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tấn công — Honeypot</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .pagination{display:flex;gap:8px;align-items:center;justify-content:center;margin-top:16px;flex-wrap:wrap}
    .page-btn{background:#2d3748;color:#e2e8f0;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px;min-width:36px}
    .page-btn:hover{background:#3d4758}
    .page-btn.active{background:#3b82f6;color:white}
    .page-btn:disabled{opacity:0.4;cursor:not-allowed}
    .page-info{font-size:13px;color:#64748b}
  </style>
</head>
<body>
  <div class="sidebar" id="sidebar">
    <div class="logo">🍯 <span class="logo-text">Honeypot</span></div>
    <nav>
      <a href="index.html" class="nav-item">📊 <span>Dashboard</span></a>
      <a href="attacks.html" class="nav-item active">🔴 <span>Tấn công</span></a>
      <a href="stats.html" class="nav-item">📈 <span>Thống kê</span></a>
      <a href="map.html" class="nav-item">🗺️ <span>Bản đồ</span></a>
    </nav>
    <div class="status">🟢 <span>Đang giám sát</span></div>
  </div>

  <button class="menu-toggle" onclick="toggleSidebar()">☰</button>

  <div class="main" id="main">
    <div class="header">
      <div>
        <h1>Danh sách tấn công</h1>
        <p id="last-updated">Cập nhật lúc: --:--:--</p>
      </div>
      <button onclick="loadAttackPage()" class="btn-refresh">🔄 Làm mới</button>
      <a href="http://localhost:8000/api/export/csv" download="honeypot_attacks.csv" class="btn-refresh">📥 Export CSV</a>
    </div>

    <div class="card filter-bar">
      <div class="filter-row">
        <div class="filter-group">
          <label>🔍 Tìm IP</label>
          <input id="filter-ip" placeholder="Nhập địa chỉ IP..." oninput="applyFilter()"/>
        </div>
        <div class="filter-group">
          <label>📋 Loại tấn công</label>
          <select id="filter-event" onchange="applyFilter()">
            <option value="">Tất cả</option>
            <option value="cowrie.login.failed">Login Failed</option>
            <option value="cowrie.login.success">Login Success</option>
            <option value="cowrie.command.input">Command Input</option>
            <option value="cowrie.session.connect">Session Connect</option>
          </select>
        </div>
        <div class="filter-group">
          <label>👤 Username</label>
          <input id="filter-user" placeholder="Tìm username..." oninput="applyFilter()"/>
        </div>
        <div class="filter-stats">
          <span id="filter-count" class="badge">0 kết quả</span>
          <button onclick="clearFilter()" class="btn-clear">✕ Xoá lọc</button>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Thời gian</th>
              <th>IP nguồn</th>
              <th>Quốc gia</th>
              <th>Username</th>
              <th>Password</th>
              <th>Loại</th>
              <th>Trạng thái</th>
            </tr>
          </thead>
          <tbody id="attack-tbody">
            <tr><td colspan="7" class="loading">Đang tải...</td></tr>
          </tbody>
        </table>
      </div>

      <!-- PAGINATION -->
      <div class="pagination" id="pagination"></div>
      <div style="text-align:center;margin-top:8px">
        <span class="page-info" id="page-info"></span>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script>
    const PAGE_SIZE  = 20
    let allAttacks   = []
    let filtered     = []
    let currentPage  = 1

    async function loadAttackPage() {
      document.getElementById('attack-tbody').innerHTML =
        '<tr><td colspan="7" class="loading">Đang tải...</td></tr>'
      allAttacks  = await fetchAttacks()
      filtered    = allAttacks
      currentPage = 1
      applyFilter()
      document.getElementById('last-updated').textContent =
        'Cập nhật lúc: ' + new Date().toLocaleTimeString('vi-VN')
    }

    function renderTable() {
      const total     = filtered.length
      const totalPage = Math.ceil(total / PAGE_SIZE)
      const start     = (currentPage - 1) * PAGE_SIZE
      const end       = Math.min(start + PAGE_SIZE, total)
      const pageData  = filtered.slice(start, end)

      document.getElementById('filter-count').textContent = `${total} kết quả`
      document.getElementById('page-info').textContent =
        `Trang ${currentPage}/${totalPage} — Hiển thị ${start+1}-${end} / ${total}`

      const tbody = document.getElementById('attack-tbody')
      if (pageData.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="loading">Không có dữ liệu</td></tr>'
      } else {
        tbody.innerHTML = pageData.map(a => {
          const isSuccess = a.event === 'cowrie.login.success'
          const isCommand = a.event === 'cowrie.command.input'
          const status    = isSuccess ? 'success' : 'failed'
          const label     = isSuccess ? '✓ Success' : isCommand ? '⌨ Command' : '✗ Failed'
          return `
            <tr>
              <td style="color:#94a3b8;font-size:12px;white-space:nowrap">${a.time||'--'}</td>
              <td style="font-family:monospace;color:#60a5fa">${a.ip||'-'}</td>
              <td style="font-size:13px">${a.country||'—'}</td>
              <td style="color:#e2e8f0">${a.username||'-'}</td>
              <td style="color:#94a3b8;font-family:monospace;font-size:12px">${a.password||'-'}</td>
              <td style="color:#64748b;font-size:12px">${(a.event||'').replace('cowrie.','')}</td>
              <td><span class="badge ${status}">${label}</span></td>
            </tr>`
        }).join('')
      }

      renderPagination(totalPage)
    }

    function renderPagination(totalPage) {
      const pg = document.getElementById('pagination')
      if (totalPage <= 1) { pg.innerHTML = ''; return }

      let html = ''

      // Nút Trước
      html += `<button class="page-btn" onclick="goPage(${currentPage-1})"
        ${currentPage===1?'disabled':''}>◀</button>`

      // Số trang
      let start = Math.max(1, currentPage - 2)
      let end   = Math.min(totalPage, start + 4)
      if (end - start < 4) start = Math.max(1, end - 4)

      if (start > 1) html += `<button class="page-btn" onclick="goPage(1)">1</button>
        ${start > 2 ? '<span class="page-info">...</span>' : ''}`

      for (let i = start; i <= end; i++) {
        html += `<button class="page-btn ${i===currentPage?'active':''}"
          onclick="goPage(${i})">${i}</button>`
      }

      if (end < totalPage) html += `${end < totalPage-1 ? '<span class="page-info">...</span>' : ''}
        <button class="page-btn" onclick="goPage(${totalPage})">${totalPage}</button>`

      // Nút Sau
      html += `<button class="page-btn" onclick="goPage(${currentPage+1})"
        ${currentPage===totalPage?'disabled':''}>▶</button>`

      pg.innerHTML = html
    }

    function goPage(page) {
      const totalPage = Math.ceil(filtered.length / PAGE_SIZE)
      if (page < 1 || page > totalPage) return
      currentPage = page
      renderTable()
      window.scrollTo(0, 0)
    }

    function applyFilter() {
      const ip    = document.getElementById('filter-ip').value.toLowerCase()
      const event = document.getElementById('filter-event').value
      const user  = document.getElementById('filter-user').value.toLowerCase()
      filtered    = allAttacks.filter(a => {
        const matchIP    = !ip    || (a.ip||'').toLowerCase().includes(ip)
        const matchEvent = !event || a.event === event
        const matchUser  = !user  || (a.username||'').toLowerCase().includes(user)
        return matchIP && matchEvent && matchUser
      })
      currentPage = 1
      renderTable()
    }

    function clearFilter() {
      document.getElementById('filter-ip').value    = ''
      document.getElementById('filter-event').value = ''
      document.getElementById('filter-user').value  = ''
      applyFilter()
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open')
    }

    loadAttackPage()
    setInterval(loadAttackPage, 30000)
  </script>
</body>
</html>
