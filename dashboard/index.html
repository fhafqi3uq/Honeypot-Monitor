<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Honeypot Monitor</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="sidebar" id="sidebar">
    <div class="logo">🍯 <span class="logo-text">Honeypot</span></div>
    <nav>
      <a href="index.html" class="nav-item active">📊 <span>Dashboard</span></a>
      <a href="attacks.html" class="nav-item">🔴 <span>Tấn công</span></a>
      <a href="stats.html" class="nav-item">📈 <span>Thống kê</span></a>
    </nav>
    <div class="status">🟢 <span>Đang giám sát</span></div>
  </div>

  <button class="menu-toggle" onclick="toggleSidebar()">☰</button>

  <div class="main" id="main">
    <div class="header">
      <div>
        <h1>Dashboard</h1>
        <p id="last-updated">Cập nhật lúc: --:--:--</p>
      </div>
      <button onclick="loadData()" class="btn-refresh">🔄 Làm mới</button>
    </div>

    <div class="stats-grid">
      <div class="stat-card blue">
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label">Tổng tấn công</div>
      </div>
      <div class="stat-card purple">
        <div class="stat-value" id="stat-ips">0</div>
        <div class="stat-label">IP unique</div>
      </div>
      <div class="stat-card yellow">
        <div class="stat-value" id="stat-failed">0</div>
        <div class="stat-label">Brute-force</div>
      </div>
      <div class="stat-card red">
        <div class="stat-value" id="stat-success">0</div>
        <div class="stat-label">Đăng nhập ✓ ⚠️</div>
      </div>
    </div>

    <div class="charts-grid">
      <div class="card">
        <h3>📊 Tấn công theo giờ</h3>
        <div class="chart-container"><canvas id="barChart"></canvas></div>
      </div>
      <div class="card">
        <h3>🥧 Phân loại</h3>
        <div class="chart-container"><canvas id="pieChart"></canvas></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h3>🔴 Tấn công gần đây</h3>
        <span id="attack-count" class="badge"></span>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Thời gian</th>
              <th>IP</th>
              <th>Username</th>
              <th>Password</th>
              <th>Loại</th>
              <th>Trạng thái</th>
            </tr>
          </thead>
          <tbody id="attack-tbody">
            <tr><td colspan="6" class="loading">Đang tải...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/app.js"></script>
  <script>
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
    }
  </script>
</body>
</html>
